name: Staging Tests

# Stage 2 of the release pipeline:
#
#   dev → pre-staging → staging ──(this workflow)──► main
#
# By the time a commit reaches `staging`, `chainmovers/sui-binaries`
# has already published a matching `suibase-daemon-v<version>` release
# (the staging-promote.yml cron only opens a PR pre-staging → staging
# when that precondition holds). So this workflow does the same
# validation the post-merge release-tests does — version-match
# assertion against the actual precompiled, then a sanity test —
# but BEFORE main is touched.
#
# On green, auto-open and auto-merge a PR `staging → main` so the
# whole chain is hands-off.
#
# Failures here ARE real bugs (the precompiled is broken, or
# scripts/tests can't handle the published binary). Unlike pre-staging,
# this branch produces meaningful alarms.

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

jobs:
  # Detect whether this push touched only docs/. If so, the expensive
  # precompiled-validate matrix is skipped — docs changes can't break
  # the released binary, so re-running the release-tests against the
  # precompiled adds no signal but costs ~10 min/run (mostly the macOS
  # validate). The open-main-pr job still runs (gated on either
  # validate succeeding OR docs-only being true), so the promotion to
  # main proceeds.
  #
  # For mixed pushes (some docs + some non-docs), full validate runs.
  # For docs-only pushes, fast-path through to main in <2 min.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.diff.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: staging
          # Need full history so the diff against the previous staging
          # tip is accurate, even when the merge brings in many commits.
          fetch-depth: 0
      - id: diff
        run: |
          set -e
          # `HEAD^1` is the OLD staging tip (first parent of the merge
          # commit). `HEAD` is the new staging tip. Diff shows exactly
          # what this push introduces.
          if ! git rev-parse HEAD^1 >/dev/null 2>&1; then
            # Edge case: first ever commit on staging (no parent).
            # Treat as not-docs-only to force full validate.
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No parent commit — running full validate."
            exit 0
          fi
          changed=$(git diff --name-only HEAD^1 HEAD)
          if [ -z "$changed" ]; then
            # Edge case: empty diff (shouldn't happen for a push event).
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No changed files — treating as docs-only (fast-path)."
            exit 0
          fi
          echo "Changed files in this push:"
          echo "$changed" | sed 's/^/  /'
          non_docs=$(echo "$changed" | grep -v '^docs/' || true)
          if [ -z "$non_docs" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only push — skipping precompiled-validate matrix."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-docs changes present — full validate required."
          fi

  validate:
    needs: detect-changes
    # Fast-path: docs-only pushes skip the ~10-min precompiled validation.
    if: needs.detect-changes.outputs.docs_only != 'true'
    name: Validate ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest]
    steps:
      - name: Checkout staging
        uses: actions/checkout@v6

      - name: Sui Prerequesites (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install curl

      - name: Sui Prerequesites (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v curl &>/dev/null; then
            brew install curl
          fi

      - name: Prepare environment
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ln -s "$GITHUB_WORKSPACE" "$HOME/suibase"

      - name: Install suibase + bootstrap daemon precompiled
        # `install` only creates symlinks; `dev/start-daemon` now
        # routes through `start_suibase_daemon_as_needed` which calls
        # `sb_app_install` — and `sb_app_install` on the `staging`
        # branch (NOT main) routes... wait — the central fix forces
        # source build on every non-main branch. So on staging we'd
        # also build from source. That's NOT what we want here: the
        # whole point of staging is to test the PRECOMPILED. We need
        # the staging branch to be treated like `main` for install
        # purposes (use precompiled, not source).
        #
        # Solution: set CFG_precompiled_bin=true and a staging-specific
        # env var to override the branch check in sb_app_install. Or
        # do the install with a checked-out `main`-like state.
        #
        # Simpler implementation: directly download the published
        # precompiled artifact from chainmovers/sui-binaries here,
        # bypassing sb_app_install's branch-aware routing. This is
        # exactly what `main`'s install flow does in production for
        # end users, so it's the most faithful pre-main validation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          "$HOME/suibase/install"

          # Read the daemon version this staging commit expects.
          # awk for portability — the previous `sed ... \+` regex is GNU-only;
          # BSD sed on macOS-latest leaves the line unchanged.
          version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' rust/suibase/Cargo.toml)
          tag="suibase-daemon-v${version}"
          echo "Expecting sui-binaries release tag: $tag"

          # Locate the platform-appropriate asset on that release. Note the
          # platform tokens come from the sui-binaries build matrix and are
          # "ubuntu" / "macos" (NOT what `uname -s` returns — `uname -s` is
          # Linux/Darwin).
          if [ "$(uname -s)" = "Darwin" ]; then
            asset_glob="*macos*"
          else
            asset_glob="*ubuntu*"
          fi

          # Download the matching asset.
          tmpdir=$(mktemp -d)
          gh release download "$tag" \
            --repo chainmovers/sui-binaries \
            --pattern "$asset_glob" \
            --dir "$tmpdir" || {
              echo "::error::Could not download $tag asset (pattern $asset_glob) for $(uname -s) from chainmovers/sui-binaries."
              echo "::error::staging-promote.yml is supposed to ensure the tag exists before opening a PR here. Investigate the publish."
              exit 1
            }

          # Extract the daemon binary and install it where sb_app_* expects.
          mkdir -p "$HOME/suibase/workdirs/common/bin"
          # Locate the .tgz that came down and extract suibase-daemon
          for f in "$tmpdir"/*.tgz "$tmpdir"/*.tar.gz; do
            [ -f "$f" ] || continue
            tar -xzf "$f" -C "$tmpdir"
          done
          # Find the binary in the extracted tree
          bin_path=$(find "$tmpdir" -type f -name suibase-daemon -perm -u+x | head -1)
          if [ -z "$bin_path" ]; then
            echo "::error::suibase-daemon binary not found in extracted asset"
            ls -lR "$tmpdir"
            exit 1
          fi
          cp "$bin_path" "$HOME/suibase/workdirs/common/bin/suibase-daemon"
          chmod +x "$HOME/suibase/workdirs/common/bin/suibase-daemon"

          # Write the version yaml the suibase scripts expect alongside the binary.
          printf "version: %s\nname: suibase-daemon\n" "$version" \
            > "$HOME/suibase/workdirs/common/bin/suibase-daemon-version.yaml"

          # Sanity start the daemon.
          "$HOME/suibase/scripts/dev/start-daemon"

      - name: Verify precompiled version matches staging's source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          src_version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' rust/suibase/Cargo.toml)
          bin_version=$("$HOME/suibase/workdirs/common/bin/suibase-daemon" --version 2>/dev/null \
            | awk '{print $2}')
          echo "staging source version:    $src_version"
          echo "installed binary version: $bin_version"
          if [ "$src_version" != "$bin_version" ]; then
            echo "::error::staging is at $src_version but the precompiled we just downloaded is $bin_version. Pipeline invariant violated — staging-promote.yml opened the PR too early or the release artifact is malformed."
            exit 1
          fi
          echo "Version match confirmed: $src_version"

      - name: Run release sanity tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$HOME/suibase/scripts/tests/run-all.sh" --release-tests

  # Parity with the daemon's `validate` job, for the localnet-tools precompiled.
  # The daemon is version-matched (it has --version); walrus-localnet-deploy has no
  # --version, so we validate it FUNCTIONALLY: download the published artifact and
  # have it deploy nodeless walrus on a real localnet (publish Move pkgs + off-node
  # committee + descriptor). This is the gate that makes main's unpinned auto-latest
  # fetch safe to consume. Linux/glibc only (the binary is glibc-24.04, like sui).
  # NOTE: this gates the SHARED staging->main promotion, so a walrus/localnet
  # regression also holds back a daemon release. If that coupling becomes a problem,
  # gate this job on a rust/localnet-tools or rust/walrus-local-sdk change (skip when unchanged) via a new
  # detect-changes output, so daemon-only releases are not blocked by walrus.
  validate-localnet-tools:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    name: Validate localnet-tools precompiled
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout staging
        uses: actions/checkout@v6

      - name: Prepare environment + install suibase
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ln -s "$GITHUB_WORKSPACE" "$HOME/suibase"
          "$HOME/suibase/install"

      - name: Install the published suibase-daemon precompiled
        # localnet start needs the daemon; install the published precompiled so it
        # does NOT source-build (no rust toolchain on this job — the point is to test
        # the PRECOMPILED localnet-tools, not compile anything).
        run: |
          set -e
          version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' rust/suibase/Cargo.toml)
          tag="suibase-daemon-v${version}"
          tmpdir=$(mktemp -d)
          gh release download "$tag" --repo chainmovers/sui-binaries --pattern '*ubuntu*' --dir "$tmpdir"
          for f in "$tmpdir"/*.tgz "$tmpdir"/*.tar.gz; do [ -f "$f" ] && tar -xzf "$f" -C "$tmpdir"; done
          bin_path=$(find "$tmpdir" -type f -name suibase-daemon -perm -u+x | head -1)
          [ -n "$bin_path" ] || { echo "::error::suibase-daemon not in $tag asset"; ls -lR "$tmpdir"; exit 1; }
          mkdir -p "$HOME/suibase/workdirs/common/bin"
          cp "$bin_path" "$HOME/suibase/workdirs/common/bin/suibase-daemon"
          chmod +x "$HOME/suibase/workdirs/common/bin/suibase-daemon"
          printf 'version: %s\nname: suibase-daemon\n' "$version" \
            > "$HOME/suibase/workdirs/common/bin/suibase-daemon-version.yaml"

      - name: Install the published localnet-tools precompiled (the artifact under test)
        run: |
          set -e
          version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' rust/localnet-tools/Cargo.toml)
          tag="localnet-tools-v${version}"
          echo "Validating $tag"
          # localnet-tools does NOT gate staging-promote (only the daemon does), so on a
          # release that bumped localnet-tools the producer may still be building. Poll.
          for i in $(seq 1 30); do
            gh release view "$tag" --repo chainmovers/sui-binaries >/dev/null 2>&1 && break
            if [ "$i" -eq 30 ]; then
              echo "::error::$tag never published after ~15 min — build-localnet-tools.yml on sui-binaries may have failed."
              exit 1
            fi
            echo "[$i/30] $tag not yet published; waiting 30s..."
            sleep 30
          done
          tmpdir=$(mktemp -d)
          gh release download "$tag" --repo chainmovers/sui-binaries --pattern '*ubuntu*' --dir "$tmpdir"
          for f in "$tmpdir"/*.tgz "$tmpdir"/*.tar.gz; do [ -f "$f" ] && tar -xzf "$f" -C "$tmpdir"; done
          bin_path=$(find "$tmpdir" -type f -name walrus-localnet-deploy | head -1)
          [ -n "$bin_path" ] || { echo "::error::walrus-localnet-deploy not in $tag asset"; ls -lR "$tmpdir"; exit 1; }
          cp "$bin_path" "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy"
          chmod +x "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy"
          # sb-local is the second binary in the localnet-tools asset (the HTTP facade).
          # HARD check: the producer (build-localnet-tools.yml on sui-binaries) builds both
          # --bin targets, so a missing sb-local means a broken/incomplete asset. The HTTP
          # step below then validates it functionally.
          sb_path=$(find "$tmpdir" -type f -name sb-local | head -1)
          [ -n "$sb_path" ] || { echo "::error::sb-local not in $tag asset"; ls -lR "$tmpdir"; exit 1; }
          cp "$sb_path" "$HOME/suibase/workdirs/common/bin/sb-local"
          chmod +x "$HOME/suibase/workdirs/common/bin/sb-local"
          echo "sb-local present in $tag asset."
          printf 'version: "%s"\nbranch: "main"\norigin: "precompiled"\n' "$version" \
            > "$HOME/suibase/workdirs/common/bin/localnet-tools-version.yaml"
          # Host-compat smoke: the glibc-24.04 binary must run on this runner.
          "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy" --help >/dev/null
          echo "$tag installed + runs."

      - name: Start localnet
        run: ~/suibase/scripts/localnet start

      - name: Enable walrus + regen — the PRECOMPILED binary deploys nodeless walrus
        run: |
          set -e
          echo "walrus_local_enabled: true" >> "$HOME/suibase/workdirs/localnet/suibase.yaml"
          ~/suibase/scripts/localnet regen
          desc="$HOME/suibase/workdirs/localnet/config/walrus-localnet.yaml"
          [ -f "$desc" ] || { echo "::error::descriptor not written — the precompiled localnet-tools deploy failed"; exit 1; }
          # The deploy hook must have used the PRECOMPILED artifact, not a source build.
          vf="$HOME/suibase/workdirs/common/bin/localnet-tools-version.yaml"
          grep -q 'origin: "precompiled"' "$vf" || { echo "::error::localnet-tools was not the precompiled artifact"; cat "$vf"; exit 1; }
          # Descriptor must point at the live localnet chain (proves a coherent deploy).
          live=$(curl -fsS -m 5 -X POST http://localhost:9000 -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"sui_getChainIdentifier","params":[]}' \
            | sed 's/.*"result":"//;s/".*//')
          got=$(sed -n 's/^chain_id:[[:space:]]*//p' "$desc" | head -1)
          echo "live chain_id=$live  descriptor chain_id=$got"
          [ "$live" = "$got" ] || { echo "::error::descriptor chain_id ($got) != live localnet ($live)"; exit 1; }
          echo "::notice::Precompiled localnet-tools deployed nodeless walrus on localnet — descriptor OK."
          cat "$desc"

      - name: Validate sb-local HTTP API (the precompiled facade)
        run: |
          set -e
          # The previous step guarantees sb-local is installed (hard check), and the regen
          # above auto-started it (its binary is in common/bin). Assert the full drop-in
          # wire contract against the PRECOMPILED facade (SB_LOCAL_HTTP_TEST=1 makes a
          # "not reachable" skip a hard failure).
          ~/suibase/scripts/localnet status | grep -i "Walrus API" || true
          SB_LOCAL_HTTP_TEST=1 ~/suibase/scripts/tests/050_walrus_tests/test_sb_local_http.sh
          echo "::notice::Precompiled sb-local served the Walrus aggregator/publisher wire API."

  open-main-pr:
    needs: [detect-changes, validate, validate-localnet-tools]
    runs-on: ubuntu-latest
    # Run when:
    #   - validate succeeded (normal non-docs path), OR
    #   - validate was skipped because this is a docs-only push
    #     (fast-path — no need to re-validate the precompiled).
    # AND the trigger is push (normal) OR workflow_dispatch (manual
    # unstick). `if: always() && (...)` because needs.validate.result
    # is "skipped" not "success" on the docs-only fast-path, but
    # `if: success()` would also accept skipped — use the explicit
    # condition for clarity.
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.validate.result == 'success' ||
       (needs.validate.result == 'skipped' && needs.detect-changes.outputs.docs_only == 'true')) &&
      (needs.validate-localnet-tools.result == 'success' ||
       (needs.validate-localnet-tools.result == 'skipped' && needs.detect-changes.outputs.docs_only == 'true'))
    permissions:
      # `contents: write` is needed by `gh pr merge --auto` to enable
      # auto-merge on a branch-protected base (main). `pull-requests:
      # write` alone is enough to OPEN the PR but not to flip the
      # auto-merge bit when main is protected. `statuses: write` is
      # required to set the `enforce-pipeline-order` commit status
      # (the workflow can't satisfy the required check via the normal
      # pull_request workflow because PRs opened by GITHUB_TOKEN don't
      # trigger pull_request events — security feature).
      contents: write
      pull-requests: write
      statuses: write
      # `actions: write` lets this workflow trigger `deploy-docs.yml`
      # via workflow_dispatch after the bot auto-merges to main.
      # Pushes by GITHUB_TOKEN do NOT fire downstream workflows
      # (anti-loop feature) — without the dispatch, deploy-docs.yml
      # never runs and the live site never updates after a release.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: staging

      - name: Open auto-merge PR staging → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if main already contains staging's tip (nothing new to
          # promote). Under `gh pr merge --merge`, after a successful
          # staging→main promotion, main is a merge commit whose second
          # parent IS staging's tip — so staging's tip is reachable from
          # main, even though their HEAD SHAs differ. A naive equality
          # check would treat this as "ahead" and open empty PRs in a
          # loop. Use `merge-base --is-ancestor` instead.
          git fetch --quiet origin main
          main_sha=$(git rev-parse origin/main)
          staging_sha=$(git rev-parse HEAD)
          if git merge-base --is-ancestor "$staging_sha" "$main_sha"; then
            echo "::notice::main already contains staging's tip ($staging_sha) — no promotion needed."
            exit 0
          fi

          # GitHub's branch protection requires `enforce-pipeline-order`
          # to pass on the PR's head commit. That check is provided by
          # pr-gate.yml on `pull_request` events — but PRs opened by
          # GITHUB_TOKEN (this workflow's default token) do NOT trigger
          # `pull_request` workflows (security feature against infinite
          # workflow loops). Since we ARE the legitimate, structurally-
          # correct head (head_ref == staging into base == main, which
          # is exactly what pr-gate enforces), set the status directly
          # via the Statuses API. Branch protection accepts a status
          # with the same context name as a satisfied required check.
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$staging_sha" \
            -f state=success \
            -f context=enforce-pipeline-order \
            -f description="head_ref=staging into base=main is allowed (set by staging.yml)" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null

          existing=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open staging → main; enabling auto-merge."
            gh pr merge "$existing" --auto --merge || gh pr merge "$existing" --merge || true
            exit 0
          fi

          # Read daemon version for the PR title.
          # awk for portability — the previous `sed ... \+` regex is GNU-only;
          # BSD sed on macOS-latest leaves the line unchanged.
          version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' rust/suibase/Cargo.toml)

          gh pr create \
            --base main \
            --head staging \
            --title "Promote staging to main (suibase-daemon v${version})" \
            --body "Auto-opened by \`staging.yml\` after the staging validation passed against the published \`suibase-daemon-v${version}\` precompiled. Will auto-merge once required checks pass."

          number=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')
          # --auto is refused with "clean status" when the PR is already mergeable
          # (all required checks satisfied at creation); fall back to a direct merge.
          gh pr merge "$number" --auto --merge || gh pr merge "$number" --merge
          echo "::notice::Opened auto-merge PR #$number staging → main."

      - name: Trigger deploy-docs.yml after bot auto-merge
        # Mirror the open-main-pr gate above — accept workflow_dispatch
        # as well as push, so manual unsticks reach deploy-docs.
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pushes by GITHUB_TOKEN don't fire downstream workflows
          # (anti-loop security). The auto-merge above pushes to `main`
          # as the bot — deploy-docs.yml's `on: push: branches: [main]`
          # would not fire. Manually dispatch it so the live site
          # updates without human intervention. The dispatch will run
          # the workflow_dispatch branch of the `if:` guard in
          # deploy-docs.yml, building+deploying regardless of whether
          # docs/ changed — slightly wasteful when a non-docs commit
          # reaches main but worth the simpler design.
          #
          # Poll for the merge to actually complete before dispatching,
          # so deploy-docs builds the post-merge main tip.
          number=$(gh pr list --base main --head staging --state all --limit 1 --json number --jq '.[0].number')
          if [ -z "$number" ]; then
            echo "::warning::No staging→main PR found to track; skipping dispatch."
            exit 0
          fi
          for i in $(seq 1 60); do
            state=$(gh pr view "$number" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              echo "PR #$number merged — dispatching deploy-docs.yml + release-tests.yml on main."
              # deploy-docs: rebuild and publish gh-pages so the live
              # site picks up content changes (or stays in sync after
              # any release). Idempotent — safe even when no docs
              # actually changed.
              gh workflow run deploy-docs.yml --ref main
              # release-tests: the "immediate post-release" sanity
              # check on main. Redundant with staging.yml's validate
              # in normal operation, but preserves the signal that
              # would otherwise be lost (release-tests.yml's `push:
              # branches: [main]` trigger doesn't fire on bot pushes).
              # If staging.yml's validate passed but release-tests on
              # the merge commit fails, something specific to main's
              # merge structure or environment is broken — worth a
              # red badge.
              gh workflow run release-tests.yml --ref main
              echo "::notice::Dispatched deploy-docs.yml + release-tests.yml after PR #$number auto-merge."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::PR #$number did not reach MERGED within 5 min; not dispatching."
