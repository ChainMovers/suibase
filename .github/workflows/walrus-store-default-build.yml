name: WalrusStore Default Build (WS7 enclave-safe)

# Fast guard for the walrus-store WS7 guarantee: the DEFAULT build (no features) must
# stay inert. A downstream enclave that consumes WalrusStore's default build must link
# NONE of the localnet mock machinery — no `suibase` helper, no walrus/Sui graph, no
# RocksDB. The heavy `localnet` feature (the nodeless mock) is exercised separately by
# walrus-localnet-integration.yml. This job compiles only the tiny default graph (two
# crates today), so it is cheap enough to run on every push / PR that touches the crate.

on:
  workflow_dispatch:
  push:
    branches: ["dev"]
    paths:
      - "rust/walrus-store/**"
      - ".github/workflows/walrus-store-default-build.yml"
  pull_request:
    paths:
      - "rust/walrus-store/**"
      - ".github/workflows/walrus-store-default-build.yml"

jobs:
  default-build-inert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust Toolchain (walrus-store pins 1.96 via rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-src-dir: "rust"
          cache: "false"

      - name: Rust Caching
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust/walrus-store -> target"

      - name: Build default (no features) — must be warning-free
        working-directory: rust/walrus-store
        run: |
          rustup toolchain install 1.96 --profile minimal
          # default = [] in Cargo.toml, so this is the inert build. Deny warnings so the
          # enclave-facing build never regresses into noise.
          RUSTFLAGS="-D warnings" cargo build

      - name: Assert WS7 — default graph excludes suibase / walrus / sui-types / rocksdb
        working-directory: rust/walrus-store
        run: |
          # Crate names in the DEFAULT (no-feature) dependency graph, one per line.
          # cargo tree reads the committed Cargo.lock, so this needs no network.
          cargo tree --no-default-features --prefix none 2>/dev/null \
            | awk 'NF {print $1}' | sort -u > /tmp/default-deps.txt
          echo "Default dependency graph ($(wc -l < /tmp/default-deps.txt) crates):"
          cat /tmp/default-deps.txt
          fail=0
          for c in suibase walrus-sui walrus-core sui-types rocksdb librocksdb-sys; do
            if grep -qx "$c" /tmp/default-deps.txt; then
              echo "::error::WS7 violation: '$c' is in the DEFAULT build graph; it must stay behind the 'localnet' feature"
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "WS7 holds: the default build links none of the mock / walrus / Sui graph."
          fi
          exit $fail
