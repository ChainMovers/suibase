name: Walrus Localnet Integration

# Heavy end-to-end test of the nodeless localnet Walrus feature: builds walrus-local-sdk
# (the localnet-only, drop-in mirror of the Mysten Walrus SDK) + the localnet-tools bins
# (the full walrus/Sui graph — git-pinned), deploys nodeless Walrus on a real localnet via
# the regen hook, and runs the mirror's integration suites: the SDK-surface round-trip
# (reserve_and_store_blobs -> read_blob -> dedup -> delete + quilt, driven through
# WalrusLocalClient + compat::WalrusApi, rust/walrus-local-sdk/tests/localnet_roundtrip.rs)
# and the storage-pool lifecycle (rust/walrus-local-sdk/tests/localnet_pool.rs).
#
# This is EXPENSIVE (the walrus-sdk/walrus-sui graph compile) so it is NOT on the per-push
# fast suites. It runs on demand and weekly, plus when the Walrus crates change on dev.
# The fast suites stay unaffected: scripts-tests runs the non-destructive wiring test
# (test_localnet_walrus_config.sh).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  push:
    branches: ["dev"]
    paths:
      - "rust/walrus-local-sdk/**"
      - "rust/localnet-tools/**"
      - ".github/workflows/walrus-localnet-integration.yml"

jobs:
  localnet-walrus-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free Disk Space (the walrus/Sui graph + localnet are large)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v6

      - name: Install Rust Toolchain (walrus-local-sdk pins 1.96 via rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-src-dir: "rust"
          cache: "false"

      - name: Rust Caching
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust/walrus-local-sdk -> target
            rust/localnet-tools -> target
          cache-on-failure: "true"

      - name: Build prerequisites (libclang for RocksDB/bindgen, etc.)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # CI runners sometimes have unattended-upgrades/apt-daily holding the dpkg lock
          # at startup, which made apt-get block until the job timed out (exit 124). Stop
          # those services to free the lock; DPkg::Lock::Timeout waits gracefully, and the
          # outer `timeout` is a hard 10-min fail-fast cap (apt normally takes <1 min).
          sudo systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
          sudo timeout 600 apt-get -o DPkg::Lock::Timeout=120 update
          sudo timeout 600 apt-get -o DPkg::Lock::Timeout=120 install -y curl cmake gcc libssl-dev pkg-config libclang-dev libpq-dev build-essential

      - name: Prepare + install suibase
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ln -s "$GITHUB_WORKSPACE" "$HOME/suibase"
          "$HOME/suibase/install"

      - name: Start localnet
        run: |
          ~/suibase/scripts/localnet start

      - name: Build localnet-tools (deploy bin + sb-local) + stage them
        working-directory: rust/localnet-tools
        run: |
          # rust-toolchain.toml pins 1.96; ensure it is installed.
          rustup toolchain install 1.96 --profile minimal
          cargo build --bin walrus-localnet-deploy --bin sb-local
          # Stage the just-built bins where the lifecycle scripts look (install_type=user);
          # there is no precompiled asset to fetch in CI, so this is the dev fallback. With
          # sb-local present, 'localnet regen' below auto-starts the HTTP server.
          mkdir -p "$HOME/suibase/workdirs/common/bin"
          cp target/debug/walrus-localnet-deploy "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy"
          cp target/debug/sb-local "$HOME/suibase/workdirs/common/bin/sb-local"

      - name: Pure-logic unit tests (blob-id/descriptor/wallet — no live localnet)
        working-directory: rust/walrus-local-sdk
        run: |
          cargo test --lib -- --nocapture

      - name: Compile-gate the testnet parity harness (no funds needed)
        working-directory: rust/walrus-local-sdk
        run: |
          # The fund-gated testnet_parity test never RUNS in CI, but compiling it proves the
          # mirror's compat::WalrusApi forwarding still matches the REAL walrus_sdk
          # WalrusNodeClient surface — catching signature/type drift without a funded wallet.
          cargo test --no-run --test testnet_parity

      - name: Enable walrus + regen (runs the nodeless deploy + starts sb-local)
        run: |
          echo "walrus_local_enabled: true" >> "$HOME/suibase/workdirs/localnet/suibase.yaml"
          ~/suibase/scripts/localnet regen
          # The deploy hook must have produced the descriptor the mock consumes.
          test -f "$HOME/suibase/workdirs/localnet/config/walrus-localnet.yaml" \
            || { echo "descriptor not written — deploy hook failed"; exit 1; }

      - name: Mirror round-trip + pool lifecycle (held-key certify, fs bytes)
        working-directory: rust/walrus-local-sdk
        env:
          WALRUS_LOCALNET_TEST: "1"
        run: |
          # SDK-surface round-trip via WalrusLocalClient + compat::WalrusApi, plus a quilt.
          cargo test --test localnet_roundtrip -- --nocapture
          # Extensive byte-range read coverage (many ranges + all input-error cases).
          cargo test --test localnet_byte_range -- --nocapture
          # Storage pools: create/store_pooled/read/pool_status/extend/grow/delete.
          cargo test --test localnet_pool -- --nocapture
          # Pool/standalone namespace coexistence (identical content, no aliasing).
          cargo test --test localnet_pool_namespace -- --nocapture
          # sb-local HTTP <-> Rust SDK interop (same store, both front doors).
          SB_LOCAL_HTTP_TEST=1 cargo test --test localnet_sb_local_interop -- --nocapture

      - name: sb-local HTTP wire round-trip (aggregator + publisher + quilt, curl)
        env:
          # Turn a "not reachable" skip into a hard failure: sb-local MUST be up
          # (auto-started by the regen above), so the full drop-in contract is exercised.
          SB_LOCAL_HTTP_TEST: "1"
        run: |
          # 'localnet status' should now show the Walrus API line.
          ~/suibase/scripts/localnet status | grep -i "Walrus API" || true
          # curl PUT/GET/Range/dedup/404 + real-id equality + quilt round-trip + interop.
          ~/suibase/scripts/tests/050_walrus_tests/test_sb_local_http.sh
