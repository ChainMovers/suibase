name: Release pipeline cron

# IMPORTANT: this workflow LIVES ON `main` (cron schedules only fire from
# the default branch in GitHub Actions) but OPERATES ON the pre-staging
# and staging branches. The GitHub Actions UI shows it under `main` in
# the run list — that's just the file's home, not a signal that main is
# being touched.
#
# What this cron actually does:
#
#   dev → pre-staging ──(this workflow)──► staging → main
#
# Every 15 min, check whether `pre-staging` has a daemon version whose
# matching release tag (`suibase-daemon-v<version>`) is published on
# `chainmovers/sui-binaries`. If yes AND `pre-staging` is ahead of
# `staging`, open an auto-merge PR `pre-staging → staging`.
#
# Promotions happen via auto-merge PR (not direct branch push) so:
#   1. branch protection on `staging` stays strict (no bypass needed)
#   2. there is an audit trail in the PR history
#
# "Waiting on the binary" is a normal operational state — the cron is
# silent (exit 0) when the tag isn't published yet, no alarm.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min — safety net for missed dispatches
  workflow_dispatch:
  # Fast path: chainmovers/sui-binaries fires this event after it
  # finishes publishing a suibase-daemon release (assets uploaded,
  # draft flipped). Cuts the average promote latency from ~7.5 min
  # (half the cron interval) to ~1 min.
  repository_dispatch:
    types: [daemon-published]

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # `statuses: write` lets this workflow set the
      # `enforce-pipeline-order` commit status directly on the PR's
      # head — needed because pr-gate.yml's pull_request workflow
      # does not fire on PRs opened by GITHUB_TOKEN (GitHub security
      # feature against infinite loops).
      statuses: write
      # `actions: write` lets this workflow trigger `staging.yml` via
      # workflow_dispatch after the bot auto-merges to staging. Pushes
      # by GITHUB_TOKEN do NOT fire downstream workflows (same
      # anti-loop feature) — without the dispatch, `staging.yml` never
      # runs and the pipeline stalls at this stage.
      actions: write
    steps:
      - name: Checkout pre-staging
        uses: actions/checkout@v6
        with:
          ref: pre-staging
          fetch-depth: 0

      - name: Read daemon version from pre-staging
        id: ver
        run: |
          # awk for portability — the GNU sed `\+` regex used previously
          # is not supported by BSD sed and silently no-ops on macOS.
          version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' \
            rust/suibase/Cargo.toml)
          if [ -z "$version" ]; then
            echo "::error::Could not parse daemon version from pre-staging's rust/suibase/Cargo.toml"
            exit 1
          fi
          tag="suibase-daemon-v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"

      - name: Compare pre-staging vs staging heads
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch staging too (checkout only got pre-staging).
          git fetch --quiet origin staging
          pre_sha=$(git rev-parse origin/pre-staging)
          staging_sha=$(git rev-parse origin/staging)
          echo "pre-staging:  $pre_sha"
          echo "staging:      $staging_sha"

          # Count commits in pre-staging that are NOT reachable from staging.
          # This is the right check under `gh pr merge --merge` semantics:
          # merging pre-staging→staging creates a merge commit on staging
          # whose second parent IS pre-staging's tip — so after the merge,
          # pre-staging's tip is reachable from staging (count = 0) and
          # there is nothing new to promote. When dev→pre-staging later
          # advances pre-staging, that new tip is NOT reachable from
          # staging (count > 0) and we promote.
          #
          # The previous `git merge-base --is-ancestor staging pre-staging`
          # check was wrong: --merge mode never makes staging an ancestor
          # of pre-staging, so the check rejected every legitimate promo.
          unmerged=$(git rev-list --count "$staging_sha..$pre_sha")
          echo "Commits on pre-staging not in staging: $unmerged"
          if [ "$unmerged" -gt 0 ]; then
            echo "ahead=true" >> "$GITHUB_OUTPUT"
          else
            echo "ahead=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to promote — staging already contains pre-staging's tip."
          fi

      - name: Check if matching sui-binaries release is PUBLISHED (not draft)
        id: tag_check
        if: steps.diff.outputs.ahead == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The sui-binaries "Build Suibase Daemon" workflow creates the
          # release tag as a DRAFT first, then uploads assets and publishes
          # later. Promoting on the draft alone would leave staging.yml
          # trying to download non-existent assets. Require the release to
          # be fully published (isDraft == false) AND have assets attached
          # before promoting.
          set +e
          state=$(gh release view "${{ steps.ver.outputs.tag }}" \
            --repo chainmovers/sui-binaries \
            --json isDraft,assets 2>/dev/null)
          rc=$?
          set -e
          if [ $rc -ne 0 ] || [ -z "$state" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Waiting on chainmovers/sui-binaries to publish ${{ steps.ver.outputs.tag }} (tag not found yet) — will retry on next cron tick."
            exit 0
          fi
          is_draft=$(echo "$state" | jq -r .isDraft)
          asset_count=$(echo "$state" | jq -r '.assets | length')
          if [ "$is_draft" = "true" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.ver.outputs.tag }} exists but is still a draft (sui-binaries build in progress) — will retry on next cron tick."
          elif [ "$asset_count" = "0" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.ver.outputs.tag }} is published but has no assets yet — will retry on next cron tick."
          else
            echo "ready=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::sui-binaries has ${{ steps.ver.outputs.tag }} (published, $asset_count assets) — promoting to staging."
          fi

      - name: Open auto-merge PR pre-staging → staging
        if: steps.diff.outputs.ahead == 'true' && steps.tag_check.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pre_sha=$(git rev-parse origin/pre-staging)

          # GitHub's branch protection requires `enforce-pipeline-order` to
          # pass on the PR's head commit. That check is provided by the
          # pr-gate.yml workflow on `pull_request` events. HOWEVER, PRs
          # opened by GITHUB_TOKEN (this workflow's default token) do NOT
          # trigger `pull_request` workflows — it's a deliberate GitHub
          # security feature to prevent infinite workflow loops.
          #
          # Since we ARE the legitimate, structurally-correct head
          # (head_ref == pre-staging, base == staging — exactly the
          # constraint pr-gate enforces), set the status directly via the
          # Statuses API. Branch protection accepts a commit status with
          # the same context name as a satisfied required check.
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$pre_sha" \
            -f state=success \
            -f context=enforce-pipeline-order \
            -f description="head_ref=pre-staging into base=staging is allowed (set by staging-promote.yml)" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null

          # Avoid duplicates if a previous cron tick already opened the PR.
          existing=$(gh pr list --base staging --head pre-staging --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open pre-staging → staging; enabling auto-merge."
            gh pr merge "$existing" --auto --merge || gh pr merge "$existing" --merge || true
            exit 0
          fi
          gh pr create \
            --base staging \
            --head pre-staging \
            --title "Promote pre-staging to staging (${{ steps.ver.outputs.tag }})" \
            --body "Auto-opened by \`staging-promote.yml\` once chainmovers/sui-binaries published \`${{ steps.ver.outputs.tag }}\`. Will auto-merge once required checks pass."
          number=$(gh pr list --base staging --head pre-staging --state open --json number --jq '.[0].number')
          # --auto is refused with "clean status" when the PR is already mergeable
          # (all required checks satisfied at creation); fall back to a direct merge.
          gh pr merge "$number" --auto --merge || gh pr merge "$number" --merge
          echo "::notice::Opened auto-merge PR #$number pre-staging → staging."

      - name: Trigger staging.yml after bot auto-merge
        if: steps.diff.outputs.ahead == 'true' && steps.tag_check.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub does NOT trigger workflows on pushes made by
          # GITHUB_TOKEN (anti-loop security). The auto-merge above
          # would push to `staging` as the bot — staging.yml's `on:
          # push: branches: [staging]` would not fire. Manually
          # dispatch it so the pipeline continues end-to-end.
          #
          # Poll for the merge to actually complete first, so we
          # dispatch staging.yml against the merged staging tip.
          number=$(gh pr list --base staging --head pre-staging --state all --limit 1 --json number --jq '.[0].number')
          if [ -z "$number" ]; then
            echo "::warning::No pre-staging→staging PR found to track; skipping dispatch."
            exit 0
          fi
          for i in $(seq 1 60); do
            state=$(gh pr view "$number" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              echo "PR #$number merged — dispatching staging.yml."
              gh workflow run staging.yml --ref staging
              echo "::notice::Dispatched staging.yml after PR #$number auto-merge."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::PR #$number did not reach MERGED within 5 min; not dispatching."

      - name: Sweep stale no-op runs of this workflow
        # GITHUB_TOKEN can't delete the workflow run that's currently
        # executing it (HTTP 403 by GitHub design), so real-time
        # self-delete isn't possible. Instead, each run sweeps its
        # OWN predecessors: any completed run of this workflow that
        # finished >15 min ago AND skipped the "Open auto-merge PR"
        # step (= no commits ahead, or sui-binaries release not yet
        # published — i.e. a no-op) gets deleted.
        #
        # The most recent runs are always left alone, which is fine:
        # they're the ones an operator wants to see when checking
        # "did the pipeline run recently?". With the 15-min cron plus
        # repository_dispatch from sui-binaries, sweeps happen often
        # enough that no-op clutter stays bounded.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          workflow_id=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows" \
            --jq '.workflows[] | select(.path == ".github/workflows/staging-promote.yml") | .id')
          cutoff=$(date -u -d '15 minutes ago' +%Y-%m-%dT%H:%M:%SZ)

          # status=success limits the candidate set to clean runs; we
          # never delete failures (those are signal worth keeping).
          run_ids=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_id/runs?status=success&per_page=50" \
            --jq ".workflow_runs[] | select(.updated_at < \"$cutoff\") | .id")

          deleted=0
          for run_id in $run_ids; do
            # The "Open auto-merge PR pre-staging → staging" step is
            # gated on both promotion conditions. If it was SKIPPED,
            # this run did no useful work and is safe to remove.
            promote_step=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs" \
              --jq '[.jobs[].steps[] | select(.name == "Open auto-merge PR pre-staging → staging")][0].conclusion // "missing"')
            if [ "$promote_step" = "skipped" ]; then
              if gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" >/dev/null 2>&1; then
                deleted=$((deleted + 1))
              fi
            fi
          done
          echo "Deleted $deleted stale no-op run(s)."
