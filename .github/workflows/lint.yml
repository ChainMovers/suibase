name: Lint

on:
  # Lint runs on dev/staging/main but NOT pre-staging. Pre-staging is a
  # waiting area for the external sui-binaries build; the lint signal
  # there is redundant with what dev already produced and what staging
  # will produce again. Reducing one of the four lint runs per release
  # cycle.
  #
  # pull_request was also removed earlier — it races against fast
  # auto-merges. By the time super-linter runs, GitHub has already
  # deleted the synthetic `refs/pull/N/merge` ref (which super-linter
  # looks up via GITHUB_SHA), causing every dev → pre-staging
  # auto-merge to produce a noisy red Lint badge on the closed PR.
  # Push events on the merged commit catch the same lint signal a
  # few seconds later.
  push:
    branches: [dev, staging, main]

  workflow_dispatch:

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: [ubuntu-latest]

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Use the PR's head SHA directly (not the synthetic
          # `refs/pull/N/merge` ref) so the checkout survives when the
          # PR is auto-merged before this workflow's checkout step
          # runs — GitHub deletes the merge ref the instant the PR
          # closes, which races every fast auto-merge from
          # `scripts/dev/merge` and produces noisy "couldn't find
          # remote ref" failures. The head SHA stays valid because
          # it's preserved in the merged branch's history.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Load environment variables from lint.env
        run: grep -v '^#' .github/lint.env >> "$GITHUB_ENV"

      - name: Super-linter
        uses: super-linter/super-linter@v6.8.0 # x-release-please-version
        env:
          # To report GitHub Actions status checks
          DISABLE_ERRORS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
